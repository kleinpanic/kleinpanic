name: Metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Overview: stats + top languages ───────────────────────────────────
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/overview.svg
          user: kleinpanic
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_animations: yes
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      # ── Lines of code (from commit history) ───────────────────────────────
      - name: Lines
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/lines.svg
          user: kleinpanic
          base: ""
          plugin_lines: yes
          plugin_lines_sections: base

      # ── Contribution calendar heatmap ─────────────────────────────────────
      - name: Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/calendar.svg
          user: kleinpanic
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 1

      # ── Followers/following people grid ───────────────────────────────────
      - name: People
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/people.svg
          user: kleinpanic
          base: ""
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28
          plugin_people_size: 28
          plugin_people_display: grid

      # ── Recently starred repos ────────────────────────────────────────────
      - name: Stars
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/stars.svg
          user: kleinpanic
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 4

      # ── Website screenshot ────────────────────────────────────────────────
      - name: Screenshot
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/screenshot.svg
          user: kleinpanic
          base: ""
          plugin_screenshot: yes
          plugin_screenshot_title: kleinpanic.com
          plugin_screenshot_url: https://kleinpanic.com
          plugin_screenshot_selector: body
          plugin_screenshot_background: yes

      # ── Fortune cookie ────────────────────────────────────────────────────
      - name: Fortune
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/fortune.svg
          user: kleinpanic
          base: ""
          plugin_fortune: yes
