name: Metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Overview: stats + top languages ───────────────────────────────────
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/overview.svg
          user: kleinpanic
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_animations: yes
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: lines, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      # ── Lines of code (total across all repos) ────────────────────────────
      - name: Lines
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/lines.svg
          user: kleinpanic
          base: ""
          plugin_lines: yes
          plugin_lines_sections: base

      # ── Achievements ───────────────────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/achievements.svg
          user: kleinpanic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: X

      # ── Contribution calendar heatmap ─────────────────────────────────────
      - name: Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/calendar.svg
          user: kleinpanic
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 1

      # ── Followers/following people grid ───────────────────────────────────
      - name: People
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/people.svg
          user: kleinpanic
          base: ""
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28
          plugin_people_size: 28
          plugin_people_display: grid

      # ── Coding habits ─────────────────────────────────────────────────────
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/habits.svg
          user: kleinpanic
          base: ""
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

      # ── Recent activity ───────────────────────────────────────────────────
      - name: Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/activity.svg
          user: kleinpanic
          base: ""
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all

      # ── Recently starred repos ────────────────────────────────────────────
      - name: Stars
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/stars.svg
          user: kleinpanic
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 4

      # ── Emoji reactions (personality) ─────────────────────────────────────
      - name: Reactions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/reactions.svg
          user: kleinpanic
          base: ""
          plugin_reactions: yes
          plugin_reactions_display: relative
          plugin_reactions_limit: 200
          plugin_reactions_limit_issues: 100
          plugin_reactions_limit_discussions: 100
          plugin_reactions_limit_discussions_comments: 100

      # ── Website screenshot ────────────────────────────────────────────────
      - name: Screenshot
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/screenshot.svg
          user: kleinpanic
          base: ""
          plugin_screenshot: yes
          plugin_screenshot_title: kleinpanic.com
          plugin_screenshot_url: https://kleinpanic.com
          plugin_screenshot_selector: body
          plugin_screenshot_background: yes

      # ── Pagespeed / Lighthouse ────────────────────────────────────────────
      - name: Pagespeed
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/pagespeed.svg
          user: kleinpanic
          base: ""
          plugin_pagespeed: yes
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_url: https://kleinpanic.com

      # ── Fortune cookie ────────────────────────────────────────────────────
      - name: Fortune
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/fortune.svg
          user: kleinpanic
          base: ""
          plugin_fortune: yes
